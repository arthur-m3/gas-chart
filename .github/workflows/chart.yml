name: Build gas forward-curve chart

on:
  # 7:30am ET on weekdays (11:30 UTC), after prior-day NYMEX settlements post.
  schedule:
    - cron: "30 11 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Exposed at job level so the SharePoint step's `if` guard can read it.
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch forward curve
        run: python fetch_curve.py

      - name: Render chart
        run: python render_chart.py

      - name: Commit and push outputs if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/
          if git diff --cached --quiet; then
            echo "No changes to outputs/; skipping commit."
          else
            git commit -m "chore: update gas forward-curve chart ($(date -u +%Y-%m-%d))"
            git push
          fi

      # Mirrors outputs/ into SharePoint. Skipped until the Azure secrets are
      # configured; once they are, any failure fails the job (and emails you).
      - name: Mirror outputs to SharePoint
        if: ${{ env.AZURE_CLIENT_ID != '' }}
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          SHAREPOINT_HOSTNAME: ${{ vars.SHAREPOINT_HOSTNAME }}
          SHAREPOINT_SITE_PATH: ${{ vars.SHAREPOINT_SITE_PATH }}
          SHAREPOINT_DRIVE: ${{ vars.SHAREPOINT_DRIVE }}
          SHAREPOINT_FOLDER: ${{ vars.SHAREPOINT_FOLDER }}
        run: python upload_sharepoint.py
